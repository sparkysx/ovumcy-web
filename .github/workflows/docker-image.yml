name: Docker Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        # Authenticated base-image pulls avoid the anonymous rate limit that causes
        # intermittent "i/o timeout" failures when resolving docker.io images.
        # Skipped if the secret is absent, so the build still works without it.
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Select public image reference
        id: public_ref
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "value=latest" >> "$GITHUB_OUTPUT"

      - name: Verify anonymous GHCR pull access
        shell: bash
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_REF: ${{ steps.public_ref.outputs.value }}
        run: |
          set -euo pipefail

          token_body="$(mktemp)"
          manifest_body="$(mktemp)"
          trap 'rm -f "$token_body" "$manifest_body"' EXIT

          token_status="$(
            curl -sSLo "$token_body" -w '%{http_code}' \
              "https://ghcr.io/token?service=ghcr.io&scope=repository:${GITHUB_REPOSITORY}:pull"
          )"

          if [[ "$token_status" != "200" ]]; then
            echo "::error::Anonymous GHCR token request for ${IMAGE_NAME}:${IMAGE_REF} returned HTTP ${token_status}. Ensure the package is linked to ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY} and that the package visibility is set to public."
            cat "$token_body"
            exit 1
          fi

          token="$(
            python3 -c 'import json, pathlib, sys; body = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")); print(body.get("token", ""))' "$token_body"
          )"

          if [[ -z "$token" ]]; then
            echo "::error::Anonymous GHCR token response for ${IMAGE_NAME}:${IMAGE_REF} did not include a bearer token."
            cat "$token_body"
            exit 1
          fi

          manifest_status="$(
            curl -sSLo "$manifest_body" -w '%{http_code}' \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${GITHUB_REPOSITORY}/manifests/${IMAGE_REF}"
          )"

          if [[ "$manifest_status" != "200" ]]; then
            echo "::error::Anonymous GHCR manifest request for ${IMAGE_NAME}:${IMAGE_REF} returned HTTP ${manifest_status}. Ensure the package is publicly pullable before considering this release published."
            cat "$manifest_body"
            exit 1
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Docker image
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
