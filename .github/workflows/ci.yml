name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

# Cancel a superseded run when new commits land on the same PR, so a rapid
# string of fixup pushes doesn't queue every intermediate run to completion.
# Only cancels pull_request runs — push (main), release, and workflow_dispatch
# always run to completion, since each may gate a deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Split from a single `test` job into test-go/test-frontend: the two halves
  # never depended on each other's output, so running them as parallel jobs
  # instead of sequential steps shortens wall-clock to roughly max(go, frontend)
  # instead of their sum. Downstream jobs that only need the Go side (coverage
  # upload, patch-coverage) depend on test-go alone; jobs that gate on "did
  # everything basic pass" (e2e, e2e-postgres-smoke) depend on both.
  test-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install staticcheck
        # git SHA for v0.6.1 (tag 2025.1.1): b8ec13ce4d00445d75da053c47498e6f9ec5d7d6 (verified via go list -m -json)
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.6.1

      # The Go wildcards in this job are scoped to our module's package trees
      # (cmd, internal, migrations, scripts, web) instead of ./... — this job
      # never runs `npm ci`, so there is no node_modules/ to sweep in, but the
      # explicit tree list stays for consistency with the other Go jobs (race,
      # patch-coverage) and to keep matching `-coverpkg` below. Keep the tree
      # list in sync with `go list ./...`.
      - name: Staticcheck
        run: '"$(go env GOPATH)/bin/staticcheck" ./cmd/... ./internal/... ./migrations/... ./scripts/... ./web/...'

      - name: Install golangci-lint
        # git SHA for v2.12.2: c0d3ddc9cf3faa61a4e378e879ece580256d76e5 (verified via go list -m -json)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Cache golangci-lint analysis cache
        # golangci-lint keeps its own per-file analysis cache under
        # ~/.cache/golangci-lint, separate from the Go build/module caches
        # setup-go already restores above. Falls back to the newest same-OS
        # cache on a go.sum/config miss (still faster than empty) instead of
        # requiring an exact key match.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('go.sum', '.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-

      - name: golangci-lint
        run: '"$(go env GOPATH)/bin/golangci-lint" run ./cmd/... ./internal/... ./migrations/... ./scripts/... ./web/...'

      - name: Go vet
        run: go vet ./cmd/... ./internal/... ./migrations/... ./scripts/... ./web/...

      - name: Go test with coverage
        # -coverpkg credits a line when ANY test exercises it (including
        # cross-package integration tests), not only its own package's unit
        # tests. The patch-coverage gate consumes this profile. Scoped to the
        # module trees (see the note above the Staticcheck step).
        run: go test ./cmd/... ./internal/... ./migrations/... ./scripts/... ./web/... -coverprofile=coverage.out -covermode=atomic -coverpkg=./cmd/...,./internal/...,./migrations/...,./scripts/...,./web/...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-out
          path: coverage.out
          if-no-files-found: error
          retention-days: 1

  test-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint:js

      - name: Frontend unit tests
        run: npm run test:unit

      - name: Frontend build
        run: npm run build

      - name: Committed bundles must match a fresh build
        # Stale-bundle guard: the production image ships the committed
        # web/static assets while e2e jobs test freshly built ones, so a
        # source change committed without `npm run build` would ship bundles
        # that were never tested. The build is hermetic and reproducible
        # (explicit @source list in web/src/css/input.css; JS bundling is
        # plain concatenation), so any diff here is a real stale bundle.
        run: |
          git diff --exit-code -- web/static/
          test -z "$(git status --porcelain -- web/static/)"

  # Thin gate job named exactly `test` — branch protection's required status
  # check is pinned to that literal context name (verified via `gh api
  # repos/ovumcy/ovumcy-web/rules/branches/main`). Renaming or removing the
  # `test` job outright would leave that required check permanently
  # unsatisfied and block every future PR; this job keeps the name while the
  # actual work runs in the parallel test-go/test-frontend jobs above.
  test:
    runs-on: ubuntu-latest
    needs:
      - test-go
      - test-frontend
    permissions:
      contents: read
    steps:
      - run: echo "test-go and test-frontend passed."

  race:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test with race detector
        # CGO is required for the race detector; the production image stays
        # CGO_ENABLED=0. Scope to packages that hold ovumcy's own shared mutable
        # state (rate-limiter maps, atomic CAS) and do NOT instantiate Fiber apps.
        # internal/api spins up hundreds of Fiber apps across its tests, which trips
        # a known fasthttp/fiber library-internal race (updateServerDate global and
        # the memory-store GC goroutine) that never occurs with the single app
        # instance in production — racing it only produces library noise, not ovumcy
        # bugs. The concurrency that is ours lives in the packages below.
        env:
          CGO_ENABLED: "1"
        run: go test -race ./internal/services/... ./internal/db/... ./internal/security/... ./internal/i18n/... ./internal/httpx/...

  coverage-upload:
    runs-on: ubuntu-latest
    needs:
      - test-go
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-out
          path: .

      - name: Upload coverage to Codecov
        id: codecov
        continue-on-error: ${{ github.event_name == 'push' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          use_oidc: true
          fail_ci_if_error: true
          # Install the CLI from PyPI instead of cli.codecov.io. The binary path
          # imports Codecov's signing key only from keybase.io, which the Actions
          # runners cannot reach reliably ("no valid OpenPGP data found" ->
          # signature check aborts before upload). PyPI install keeps integrity
          # (pip over TLS, package hashes) without the keybase dependency.
          use_pypi: true

      - name: Warn on non-blocking Codecov failure
        if: ${{ github.event_name == 'push' && steps.codecov.outcome == 'failure' }}
        run: echo "::warning::Codecov upload failed on push. Coverage artifact was generated successfully, but Codecov ingest returned an external error."

  patch-coverage:
    runs-on: ubuntu-latest
    needs:
      - test-go
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-out
          path: .

      - name: Fetch base branch
        run: git fetch --no-tags origin ${{ github.event.pull_request.base.ref }}

      - name: Enforce patch coverage
        # Fails when a modified, coverable Go line is not covered by tests. This
        # is the in-CI, self-contained replacement for the external codecov patch
        # status, which can stall and deadlock a required check. See
        # scripts/patchcov for the gate logic (test files and tooling excluded).
        env:
          COVERAGE_FILE: coverage.out
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: go run ./scripts/patchcov

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_e2e: ${{ steps.detect.outputs.run_e2e }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect whether browser e2e is needed
        id: detect
        # Fail-safe default is to RUN the browser e2e jobs. The Playwright suite
        # exercises the real Go app end-to-end, so backend, template, asset,
        # locale, dependency, Docker, and CI changes can all affect it. We only
        # skip when a pull request touches *nothing but* docs/meta files, or
        # .clusterfuzzlite/ (a separate ClusterFuzzLite build sandbox that is
        # never compiled into the app binary or go:embed'd — see
        # .clusterfuzzlite/Dockerfile), that cannot change the running app. Any
        # path outside the allowlist runs e2e.
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Deliberately no `set -e`: this job must never fail, because the
          # required e2e jobs depend on it and a failed dependency would leave
          # their required checks unsatisfied. Default to running e2e; only flip
          # to false on a positive docs-only determination.
          run_e2e=true
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if git fetch --no-tags origin "$BASE_REF"; then
              files="$(git diff --name-only "origin/${BASE_REF}...HEAD" || true)"
              echo "Changed files:"
              echo "$files"
              if [ -n "$files" ]; then
                # Anything NOT matching this docs/meta allowlist forces e2e to run.
                app_changes="$(printf '%s\n' "$files" | grep -vE '^(docs/|\.clusterfuzzlite/|LICENSE$|\.gitignore$|\.gitattributes$|.*\.md$)' || true)"
                if [ -z "$app_changes" ]; then
                  echo "Docs/meta-only change: skipping browser e2e jobs."
                  run_e2e=false
                else
                  echo "App-affecting change detected: running browser e2e jobs."
                fi
              else
                echo "Empty diff: defaulting to running e2e."
              fi
            else
              echo "Base ref fetch failed: defaulting to running e2e."
            fi
          else
            echo "Non-PR event ($EVENT_NAME): running e2e."
          fi
          echo "run_e2e=$run_e2e" >> "$GITHUB_OUTPUT"

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    needs:
      - test
      - changes
    # `e2e` is a required status check (branch protection) AND admins are
    # enforced, so this job must always run and report a result. Skipping the
    # whole job via a job-level `if` would leave the required check unsatisfied
    # and could permanently block docs-only PRs. Instead the job always starts
    # and each work step is gated: on a docs-only change every step is skipped
    # and the job goes green in seconds, satisfying the required check.
    env:
      RUN_E2E: ${{ needs.changes.outputs.run_e2e }}

    steps:
      - name: Checkout
        if: env.RUN_E2E == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        if: env.RUN_E2E == 'true'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        if: env.RUN_E2E == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install frontend and e2e dependencies
        if: env.RUN_E2E == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: env.RUN_E2E == 'true'
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: env.RUN_E2E == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies (cache hit)
        # The cache above only covers the downloaded browser binaries under
        # ~/.cache/ms-playwright; system packages (apt) never persist across
        # a fresh runner, so they still need installing even on a browser
        # cache hit — this is the fast path (no browser download).
        if: env.RUN_E2E == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright e2e (smoke on push, full otherwise)
        if: env.RUN_E2E == 'true'
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npm run e2e:ci -- e2e/auth-login-register.spec.ts e2e/dashboard.spec.ts e2e/theme-dark-mode.spec.ts
          else
            npm run e2e:ci
          fi
        env:
          E2E_APP_PORT: 18080

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            .tmp/e2e
          if-no-files-found: ignore

  e2e-postgres-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    needs:
      - test
      - changes
    # Required status check with admin enforcement: always run the job and gate
    # the work per step (see the `e2e` job above) so docs-only PRs stay green
    # without leaving this required check unsatisfied. The Postgres/multi-locale
    # coverage this job adds over the plain `e2e` job is also only needed on
    # push/release/dispatch, not on every PR, so RUN_HEAVY gates it further.
    env:
      RUN_E2E: ${{ needs.changes.outputs.run_e2e }}
      RUN_HEAVY: ${{ github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        if: env.RUN_E2E == 'true' && env.RUN_HEAVY == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        if: env.RUN_E2E == 'true' && env.RUN_HEAVY == 'true'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        if: env.RUN_E2E == 'true' && env.RUN_HEAVY == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install frontend and e2e dependencies
        if: env.RUN_E2E == 'true' && env.RUN_HEAVY == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: env.RUN_E2E == 'true' && env.RUN_HEAVY == 'true'
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: env.RUN_E2E == 'true' && env.RUN_HEAVY == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies (cache hit)
        if: env.RUN_E2E == 'true' && env.RUN_HEAVY == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright Postgres smoke
        if: env.RUN_E2E == 'true' && env.RUN_HEAVY == 'true'
        run: npm run e2e:ci:postgres -- e2e/auth-login-register.spec.ts e2e/dashboard.spec.ts e2e/theme-dark-mode.spec.ts
        env:
          E2E_APP_PORT: 18081

      - name: Upload Playwright Postgres artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-postgres-artifacts
          path: |
            playwright-report
            test-results
            .tmp/e2e
          if-no-files-found: ignore

  e2e-cross-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    needs:
      - test
      - changes
    # Not a required status check, so cross-browser coverage beyond the plain
    # `e2e` job's Chromium run is deferred to push/release/dispatch.
    if: needs.changes.outputs.run_e2e == 'true' && (github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install frontend and e2e dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-cross-browser-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install Playwright OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Run Playwright cross-browser smoke
        run: npm run e2e:cross-browser
        env:
          E2E_APP_PORT: 18082

      - name: Upload Playwright cross-browser artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-cross-browser-artifacts
          path: |
            playwright-report
            test-results
            .tmp/e2e
          if-no-files-found: ignore

  image-smoke:
    # Boots the actual FROM-scratch runtime image and hits its public surfaces.
    # The unit/e2e jobs exercise the app under `go run`; only this job proves the
    # embedded templates/locales/web-static (go:embed) and the static.New asset
    # middleware serve correctly from the shell-less scratch image, and that the
    # in-container `ovumcy healthcheck` self-probe passes. Not a required status
    # check and the image isn't built on PRs at all, so this runs on
    # push/release/dispatch, catching an asset/embed/packaging regression
    # before it reaches a release tag.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    needs:
      - changes
    if: needs.changes.outputs.run_e2e == 'true' && (github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build runtime image
        # GHA-cached build (shared with the trivy-image build in security.yml
        # for the same ref) so this doesn't rebuild every layer from scratch
        # despite `trivy-image` staying a separate required check.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: ovumcy-image-smoke:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot image and smoke public surfaces
        run: |
          set -euo pipefail
          secret="$(openssl rand -hex 32)"
          cid="$(docker run -d --rm -p 18080:8080 -e SECRET_KEY="$secret" ovumcy-image-smoke:${{ github.sha }})"
          trap 'docker stop "$cid" >/dev/null 2>&1 || true' EXIT

          # The scratch image has no shell/curl, so probe readiness from the host.
          ready=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:18080/healthz >/dev/null 2>&1; then ready=1; break; fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then echo "app did not become healthy"; docker logs "$cid" || true; exit 1; fi

          curl -fsS http://localhost:18080/healthz | grep -q '"status":"ok"'

          # /login renders from embedded templates.
          login="$(curl -fsS http://localhost:18080/login)"
          printf '%s' "$login" | grep -q 'id="login-form"'

          # A versioned /static asset serves via static.New from the embedded FS
          # with the release cache header.
          asset="$(printf '%s' "$login" | grep -oE '/static/[^"?]+\?v=[A-Za-z0-9]+' | head -1)"
          if [ -z "$asset" ]; then echo "no versioned static asset found in /login"; exit 1; fi
          curl -fsS -D - -o /dev/null "http://localhost:18080$asset" \
            | tr -d '\r' | grep -iq '^cache-control: public, max-age=3600'

          # The container's own HEALTHCHECK command (the binary self-probe).
          docker exec "$cid" /app/ovumcy healthcheck

          echo "image smoke OK: healthz + login + static ($asset) + in-container healthcheck"
