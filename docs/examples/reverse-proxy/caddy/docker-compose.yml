services:
  ovumcy:
    image: ${OVUMCY_IMAGE:-ghcr.io/ovumcy/ovumcy-web:v1.7.0}
    pull_policy: always
    environment:
      TZ: ${TZ:-UTC}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en}
      DB_DRIVER: ${DB_DRIVER:-sqlite}
      SECRET_KEY: ${SECRET_KEY:-}
      SECRET_KEY_FILE: ${SECRET_KEY_FILE:-}
      DB_PATH: /app/data/ovumcy.db
      DATABASE_URL: ${DATABASE_URL:-}
      COOKIE_SECURE: "true"
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_CA_FILE: ${OIDC_CA_FILE:-}
      OIDC_LOGIN_MODE: ${OIDC_LOGIN_MODE:-hybrid}
      OIDC_AUTO_PROVISION: ${OIDC_AUTO_PROVISION:-false}
      OIDC_AUTO_PROVISION_ALLOWED_DOMAINS: ${OIDC_AUTO_PROVISION_ALLOWED_DOMAINS:-}
      OIDC_LOGOUT_MODE: ${OIDC_LOGOUT_MODE:-local}
      OIDC_POST_LOGOUT_REDIRECT_URL: ${OIDC_POST_LOGOUT_REDIRECT_URL:-}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-8}
      RATE_LIMIT_LOGIN_WINDOW: ${RATE_LIMIT_LOGIN_WINDOW:-15m}
      RATE_LIMIT_FORGOT_PASSWORD_MAX: ${RATE_LIMIT_FORGOT_PASSWORD_MAX:-8}
      RATE_LIMIT_FORGOT_PASSWORD_WINDOW: ${RATE_LIMIT_FORGOT_PASSWORD_WINDOW:-1h}
      RATE_LIMIT_API_MAX: ${RATE_LIMIT_API_MAX:-300}
      RATE_LIMIT_API_WINDOW: ${RATE_LIMIT_API_WINDOW:-1m}
      TRUST_PROXY_ENABLED: "true"
      # Read the real client IP from X-Real-IP, which the Caddyfile sets to
      # {remote_host} (unspoofable). The edge rate limiters are spoof-resistant
      # on X-Forwarded-For too (they key on the rightmost untrusted hop relative
      # to TRUSTED_PROXIES), but X-Real-IP also gives a spoof-proof c.IP() for the
      # secondary per-client auth buckets.
      PROXY_HEADER: X-Real-IP
      TRUSTED_PROXIES: 172.30.0.0/29
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ovumcy_data:/app/data
      # Optional: mount a file-backed app secret and set SECRET_KEY_FILE=/run/secrets/ovumcy_secret_key in .env
      # - ./secrets/ovumcy_secret_key:/run/secrets/ovumcy_secret_key:ro
      # Optional: mount a private OIDC CA bundle and set OIDC_CA_FILE=/run/certs/oidc-provider-ca.pem in .env
      # - ./certs/oidc-provider-ca.pem:/run/certs/oidc-provider-ca.pem:ro
    healthcheck:
      test: ["CMD", "/app/ovumcy", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
    restart: unless-stopped

  caddy:
    image: caddy:2.10.2-alpine
    pull_policy: always
    depends_on:
      ovumcy:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/29

volumes:
  ovumcy_data:
  caddy_data:
  caddy_config:
