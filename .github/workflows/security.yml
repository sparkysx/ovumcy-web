name: Security

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRIVY_IMAGE: aquasec/trivy:0.68.2@sha256:05d0126976bdedcd0782a0336f77832dbea1c81b9cc5e4b3a5ea5d2ec863aca7

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "41 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

# Cancel a superseded run when new commits land on the same PR, so a rapid
# string of fixup pushes doesn't queue every intermediate run to completion.
# Only cancels pull_request runs — push (main), the weekly schedule, and
# workflow_dispatch always run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gosec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      GOBIN: ${{ github.workspace }}/.bin

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        # git SHA for v2.22.4: 6decf96c3d272d5a8bbdcf9fddb5789d0be16a8d (verified via go list -m -json)
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4

      - name: Prepare security artifact directory
        run: mkdir -p .tmp/security

      - name: Run gosec
        run: ./.bin/gosec -fmt sarif -out .tmp/security/gosec.sarif ./cmd/... ./internal/...

      - name: Upload gosec SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: .tmp/security/gosec.sarif
          category: gosec

      - name: Upload gosec artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gosec-results
          path: .tmp/security/gosec.sarif
          if-no-files-found: error

  govulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GOBIN: ${{ github.workspace }}/.bin

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck
        # Call-graph reachability gate: govulncheck exits non-zero only when the
        # code actually calls a known-vulnerable symbol. Vulnerable-but-unreachable
        # packages are left to the Trivy package scan; surfacing them here as SARIF
        # only floods the Security tab with findings the code never reaches.
        run: ./.bin/govulncheck ./...

  trivy-fs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to Docker Hub
        # Skipped on fork PRs where the secret is unavailable; authenticated pulls
        # on trusted runs avoid the anonymous Docker Hub rate limit.
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare security artifact directory
        run: mkdir -p .tmp/security

      - name: Run Trivy filesystem scan
        run: docker run --rm -v "${{ github.workspace }}:/work" -w /work "${{ env.TRIVY_IMAGE }}" fs --scanners vuln --skip-version-check --severity HIGH,CRITICAL --ignore-unfixed --include-dev-deps --skip-dirs .tmp --skip-dirs .tmp_docker_ctx --skip-dirs web/static --format sarif --output .tmp/security/trivy-fs.sarif --exit-code 1 .

      - name: Upload Trivy filesystem SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: .tmp/security/trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy filesystem artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-fs-results
          path: .tmp/security/trivy-fs.sarif
          if-no-files-found: error

  trivy-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to Docker Hub
        # Skipped on fork PRs where the secret is unavailable; authenticated pulls
        # on trusted runs avoid the anonymous Docker Hub rate limit.
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build runtime image for scanning
        # GHA-cached build (shared with the image-smoke build in ci.yml for the
        # same ref). `trivy-image` is a required status check, so it cannot be
        # merged into a shared build-once job without reconfiguring branch
        # protection required checks; this cache is the honest dedup available
        # without that change.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: ovumcy-security:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare security artifact directory
        run: mkdir -p .tmp/security

      - name: Run Trivy image scan
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "${{ github.workspace }}:/work" -w /work "${{ env.TRIVY_IMAGE }}" image --scanners vuln --skip-version-check --severity HIGH,CRITICAL --ignore-unfixed --format sarif --output .tmp/security/trivy-image.sarif --exit-code 1 ovumcy-security:${{ github.sha }}

      - name: Generate CycloneDX SBOM
        if: always()
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "${{ github.workspace }}:/work" -w /work "${{ env.TRIVY_IMAGE }}" image --skip-version-check --format cyclonedx --output .tmp/security/ovumcy-image.cdx.json ovumcy-security:${{ github.sha }}

      - name: Upload Trivy image SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: .tmp/security/trivy-image.sarif
          category: trivy-image

      - name: Upload Trivy image artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-results
          path: |
            .tmp/security/trivy-image.sarif
            .tmp/security/ovumcy-image.cdx.json
          if-no-files-found: error
