name: Mutation

# Advisory mutation testing. Changes land through PRs, but full mutation runs
# are far too slow to gate merges, so this stays advisory: it runs on a weekly
# schedule to track test efficacy over time, plus on demand via
# workflow_dispatch. It never fails the build on a low score — but an
# infrastructure failure (missing output for a target) fails the job loudly
# instead of silently leaving that target's report stale. Fast iteration is
# done locally with scripts/mutation.sh (baseline | diff <ref>).

on:
  schedule:
    - cron: "23 4 * * 1" # weekly, Monday 04:23 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation-baseline:
    runs-on: ubuntu-latest
    # One job per target instead of one sequential job for all three: each
    # target gets its own fresh runner disk. Running services+security+api
    # back-to-back on a single runner previously drove free disk space down
    # to ~61MB (go build cache + gremlins temp output accumulating across
    # targets) before internal/api — by far the largest, slowest target —
    # ever got a turn. Splitting also improves wall-clock via parallelism.
    #
    # internal/api and internal/services are each additionally split into 5
    # file-subset shards. internal/api first (issue #161): a single unsharded
    # internal_api run (manual dispatch 28741574692, job 85225182461) was killed
    # at the 3h0m0s hard cap, having reached only ~85% of the package's files at
    # a steady, non-decelerating mutant rate. internal/services followed
    # (dispatch 28827683010, job 85494460161) — it finished its whole run in
    # 1h53m as recently as run 28758365493 but its integration/property suites
    # then grew until the single job hit the same 3h cap, so it now shards too.
    # In both cases the heavier DB-integration tests (not raw file count) are
    # the bottleneck. gremlins v0.6.0 has no package-subdivision or
    # --include-files flag, only repeatable --exclude-files <regexp>, so
    # scripts/mutation.sh partitions each package's own files into 5 groups at
    # run time (round-robin over a live, sorted directory listing — never a
    # hardcoded file list) and each shard excludes every file not in its group.
    # 5 shards puts each at ~17–23 files with comfortable margin under the
    # timeout even versus a pessimistic multi-hour full-package estimate.
    # This is a hang guard, not a runtime target — the job is advisory
    # (continue-on-error below) regardless.
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: internal_services_1
          - slug: internal_services_2
          - slug: internal_services_3
          - slug: internal_services_4
          - slug: internal_services_5
          - slug: internal_security
          - slug: internal_api_1
          - slug: internal_api_2
          - slug: internal_api_3
          - slug: internal_api_4
          - slug: internal_api_5
    env:
      GOBIN: ${{ github.workspace }}/.bin
      MUTATION_WORKERS: "2"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0

      - name: Verify internal/api shard partition
        # Cheap, gremlins-independent guard: proves every internal/api
        # non-test .go file is assigned to exactly one shard (no gaps, no
        # overlaps) before any shard spends time mutating. Runs in every
        # matrix entry (including services/security, where it is a no-op
        # check over the same fixed partition) so a broken partition fails
        # loudly on the very next push instead of silently mis-scoping a
        # shard's coverage.
        run: bash scripts/mutation.sh verify-shards

      - name: Run mutation baseline
        # Advisory: gremlins runs without thresholds, so it exits 0 regardless of
        # score. continue-on-error guards against infrastructure hiccups too —
        # the next step turns a missing report into a hard failure instead.
        continue-on-error: true
        env:
          GREMLINS: ${{ github.workspace }}/.bin/gremlins
        run: bash scripts/mutation.sh baseline "${{ matrix.slug }}"

      - name: Verify mutation output was produced
        # Silent-failure guard: if the step above died partway (OOM, disk
        # exhaustion, timeout) without gremlins ever writing its report, fail
        # the job loudly instead of leaving .mutation/<slug>.md permanently
        # reading "pending first weekly CI run".
        run: |
          out=".tmp/mutation/${{ matrix.slug }}.json"
          if [ ! -s "$out" ]; then
            echo "::error::no mutation report produced for ${{ matrix.slug }} ($out missing or empty)"
            exit 1
          fi

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-baseline-results-${{ matrix.slug }}
          path: .tmp/mutation/
          if-no-files-found: ignore

  mutation-merge:
    # Combines each sharded package's 5 shard JSON reports into one
    # .tmp/mutation/<base>.json so downstream consumers (the test-suite auditor,
    # a future internal-<base>.md score refresh) can read a single file matching
    # the naming convention every other target already uses, instead of learning
    # about 5 shard-specific filenames. One matrix leg per sharded package. Runs
    # after all shards finish; always attempts the merge (if: always()) so a
    # partial set of shard artifacts still produces a partial combined report
    # rather than nothing.
    needs: mutation-baseline
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        base: [internal_api, internal_services]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download ${{ matrix.base }} shard artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mutation-baseline-results-${{ matrix.base }}_*
          path: .tmp/mutation-shards
          merge-multiple: false

      - name: Merge shard reports
        # scripts/mutation.sh merge-shards shells out to `go run
        # ./scripts/mutationmerge` — needs the Go toolchain from the step above.
        run: bash scripts/mutation.sh merge-shards ${{ matrix.base }}

      - name: Upload merged ${{ matrix.base }} results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-baseline-results-${{ matrix.base }}
          path: .tmp/mutation/${{ matrix.base }}.json
          if-no-files-found: ignore
