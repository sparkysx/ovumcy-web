name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint:js

      - name: Install staticcheck
        # git SHA for v0.6.1 (tag 2025.1.1): b8ec13ce4d00445d75da053c47498e6f9ec5d7d6 (verified via go list -m -json)
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.6.1

      - name: Staticcheck
        run: '"$(go env GOPATH)/bin/staticcheck" ./...'

      - name: Go vet
        run: go vet ./...

      - name: Go test with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Frontend build
        run: npm run build

      - name: Upload coverage artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-out
          path: coverage.out
          if-no-files-found: error
          retention-days: 1

  coverage-upload:
    runs-on: ubuntu-latest
    needs:
      - test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download coverage artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: coverage-out
          path: .

      - name: Upload coverage to Codecov
        id: codecov
        continue-on-error: ${{ github.event_name == 'push' }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: coverage.out
          use_oidc: true
          fail_ci_if_error: true

      - name: Warn on non-blocking Codecov failure
        if: ${{ github.event_name == 'push' && steps.codecov.outcome == 'failure' }}
        run: echo "::warning::Codecov upload failed on push. Coverage artifact was generated successfully, but Codecov ingest returned an external error."

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install frontend and e2e dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e (smoke on push, full otherwise)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npm run e2e:ci -- e2e/auth-login-register.spec.ts e2e/dashboard.spec.ts e2e/theme-dark-mode.spec.ts
          else
            npm run e2e:ci
          fi
        env:
          E2E_APP_PORT: 18080

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            .tmp/e2e
          if-no-files-found: ignore

  e2e-postgres-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install frontend and e2e dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Postgres smoke
        run: npm run e2e:ci:postgres -- e2e/auth-login-register.spec.ts e2e/dashboard.spec.ts e2e/theme-dark-mode.spec.ts
        env:
          E2E_APP_PORT: 18081

      - name: Upload Playwright Postgres artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-postgres-artifacts
          path: |
            playwright-report
            test-results
            .tmp/e2e
          if-no-files-found: ignore

  e2e-cross-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install frontend and e2e dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright cross-browser smoke
        run: npm run e2e:cross-browser
        env:
          E2E_APP_PORT: 18082

      - name: Upload Playwright cross-browser artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-cross-browser-artifacts
          path: |
            playwright-report
            test-results
            .tmp/e2e
          if-no-files-found: ignore
