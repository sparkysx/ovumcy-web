# Validate changes before merge:
# curl -X POST --data-binary @codecov.yml https://codecov.io/validate

codecov:
  # Deliberately false. When true, Codecov withholds every status until it has
  # independently concluded that CI passed — and on 2026-07-21 it stopped
  # deriving that signal, leaving `ci_passed` null on pull-request heads while
  # coverage itself ingested normally.
  #
  # The authoritative patch gate here is the in-CI `patch-coverage` job, so a
  # withheld Codecov status cannot freeze merges in this repository the way it
  # did where a `codecov/*` check was required. What it does instead is worse
  # than useless: the advisory second opinion disappears silently rather than
  # reporting, so a coverage regression Codecov would have flagged looks the
  # same as a clean run.
  #
  # Nothing is lost by dropping it: the ruleset on `main` already requires test,
  # e2e, e2e-postgres-smoke, gosec, trivy-fs, trivy-image, patch-coverage, and
  # all three CodeQL analyses to pass on their own. Codecov's opinion about
  # whether CI passed duplicated a gate GitHub enforces directly, while standing
  # in front of it as a single point of failure.
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
        informational: false
    patch:
      default:
        # The 100% patch-coverage rule is enforced by the in-CI scripts/patchcov
        # job (required status "patch-coverage"), which understands this repo's
        # inline `// codecov:ignore` convention for genuinely unreachable lines
        # (e.g. main() composition-root log.Fatal wiring). The Codecov service
        # cannot parse those annotations, so it miscounts exempted lines as
        # missing and cannot reach 100% on a PR that relocates such wiring. Keep
        # its status informational — it reports without failing the checklist,
        # while patch-coverage remains the authoritative 100% gate.
        target: 100%
        threshold: 0%
        informational: true

# Tooling and test-only helpers are excluded from coverage reporting, matching
# the in-CI scripts/patchcov gate. These are not product code.
ignore:
  - "scripts"
  - "internal/testdb"

github_checks:
  annotations: true

# The authoritative patch gate is the in-CI scripts/patchcov job (required
# status "patch-coverage"), which understands this repo's inline codecov:ignore
# convention. The Codecov service cannot parse those annotations, so suppress
# its PR comment to avoid a misleading second opinion.
comment: false
